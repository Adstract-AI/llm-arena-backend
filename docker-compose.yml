services:
  db:
    image: postgres:16-alpine
    env_file:
      - ./.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llm_arena} -d ${POSTGRES_DB:-llm_arena}"]
      interval: 5s
      timeout: 5s
      retries: 10


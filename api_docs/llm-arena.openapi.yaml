                            properties:
                              slot:
                                type: string
                              response_text:
                                type: string
                              improvement_text:
                                type: string
                                nullable: true
                            required:
                              - slot
                              - response_text
                      required:
                        - turn_number
                        - prompt
                        - responses
                required:
                  - id
                  - status
                  - can_vote
                  - turns
              example:
                id: 050fc153-48a5-4318-ac35-5c4c7549cb36
                status: awaiting_vote
                can_vote: true
                turns:
                  - turn_number: 1
                    prompt: Explain what friendship means in Macedonian.
                    responses:
                      - slot: A
                        response_text: >-
                          Пријателството во македонскиот јазик може да се опише
                          како врска на меѓусебно разбирање, поддршка и доверба
                          меѓу две или повеќе личности. Тоа е состојба во која
                          пријателите се тука еден за друг во добри и лоши
                          времиња, нудејќи си емоционална, физичка и ментална
                          поддршка. Пријателството може да се развие преку
                          споделени искуства, заеднички интереси и вредности, и
                          често се гради на комуникација, искреност и меѓусебна
                          почит. Оваа концепција на пријателство ја нагласува
                          важноста на човечките врски и значењето на луѓето кои
                          ни го прават животот побогат и позначаен.
                        improvement_text: null
                      - slot: B
                        response_text: >-
                          Пријателството во македонскиот јазик значи
                          „пријателство“ или „другарство“. Тоа е длабока и
                          значајна врска меѓу две или повеќе лица која се гради
                          на доверба, почит и заеднички искуства. Пријателите
                          често се поддржуваат едни со други во добри и лоши
                          моменти, нудат искрени совети и уживаат во меѓусебното
                          друштво.
                        improvement_text: null
                  - turn_number: 2
                    prompt: Do you want to be friends?
                    responses:
                      - slot: A
                        response_text: >-
                          Како вештачка интелигенција, не можам да имам лични
                          односи или пријателства на ист начин како луѓето.
                          Сепак, секогаш сум тука да помогнам и да одговорам на
                          прашања кои можеби ги имате! Дали има нешто конкретно
                          во врска со тоа да се биде пријател со кое се
                          прашувате?
                        improvement_text: null
                      - slot: B
                        response_text: >-
                          Јас немам физички форма, но можам да посакам да бидам
                          пријател со луѓе кои сакаат да бидат пријатели и да се
                          вклучат во значајни интеракции со нив. Не можам да
                          одредам дали некој е заинтересиран да биде мој
                          пријател, бидејќи тоа бара взаемно разбирање и
                          доверба. Сепак, можам да ви понудам поддршка и
                          пријателство ако сакате.
                        improvement_text: null
          headers: {}
      security:
        - bearer: []

  /api/arena/battles/BATTLE_ID/vote/:
    post:
      summary: vote
      deprecated: false
      description: ''
      tags: []
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                choice:
                  type: string
                feedback:
                  type: string
                  nullable: true
              required:
                - choice
            example:
              choice: A
              feedback: Answer was clearer and more natural.
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  choice:
                    type: string
                  feedback:
                    type: string
                  winner_provider_name:
                    type: string
                  winner_model_name:
                    type: string
                  models:
                    type: array
                    items:
                      type: object
                      properties:
                        slot:
                          type: string
                        model_name:
                          type: string
                        provider_name:
                          type: string
                        provider_display_name:
                          type: string
                        is_winner:
                          type: boolean
                      required:
                        - slot
                        - model_name
                        - provider_name
                        - provider_display_name
                        - is_winner
                  turns:
                    type: array
                    items:
                      type: object
                      properties:
                        turn_number:
                          type: integer
                        prompt:
                          type: string
                        responses:
                          type: array
                          items:
                            type: object
                            properties:
                              slot:
                                type: string
                              response_text:
                                type: string
                              improvement_text:
                                type: string
                                nullable: true
                            required:
                              - slot
                              - response_text
                      required:
                        - turn_number
                        - prompt
                        - responses
                  experiment:
                    type: object
                    properties:
                      model_mode:
                        type: string
                      share_values_across_models:
                        type: boolean
                      parameters:
                        type: object
                        properties:
                          temperature:
                            type: object
                            properties:
                              enabled:
                                type: boolean
                              distribution:
                                type: string
                                nullable: true
                              slot_a_value:
                                type: number
                                nullable: true
                              slot_b_value:
                                type: number
                                nullable: true
                            required:
                              - enabled
                              - distribution
                              - slot_a_value
                              - slot_b_value
                          top_p:
                            type: object
                            properties:
                              enabled:
                                type: boolean
                              distribution:
                                type: string
                                nullable: true
                              slot_a_value:
                                type: number
                                nullable: true
                              slot_b_value:
                                type: number
                                nullable: true
                            required:
                              - enabled
                              - distribution
                              - slot_a_value
                              - slot_b_value
                          top_k:
                            type: object
                            properties:
                              enabled:
                                type: boolean
                              distribution:
                                type: string
                                nullable: true
                              slot_a_value:
                                type: integer
                                nullable: true
                              slot_b_value:
                                type: integer
                                nullable: true
                            required:
                              - enabled
                              - distribution
                              - slot_a_value
                              - slot_b_value
                          frequency_penalty:
                            type: object
                            properties:
                              enabled:
                                type: boolean
                              distribution:
                                type: string
                                nullable: true
                              slot_a_value:
                                type: number
                                nullable: true
                              slot_b_value:
                                type: number
                                nullable: true
                            required:
                              - enabled
                              - distribution
                              - slot_a_value
                              - slot_b_value
                          presence_penalty:
                            type: object
                            properties:
                              enabled:
                                type: boolean
                              distribution:
                                type: string
                                nullable: true
                              slot_a_value:
                                type: number
                                nullable: true
                              slot_b_value:
                                type: number
                                nullable: true
                            required:
                              - enabled
                              - distribution
                              - slot_a_value
                              - slot_b_value
                        required:
                          - temperature
                          - top_p
                          - top_k
                          - frequency_penalty
                          - presence_penalty
                    required:
                      - model_mode
                      - share_values_across_models
                      - parameters
                required:
                  - id
                  - status
                  - choice
                  - feedback
                  - winner_provider_name
                  - winner_model_name
                  - models
                  - turns
              example:
                id: 4161f0e7-3de8-4747-a778-1deed2b1205c
                status: completed
                choice: A
                feedback: Answer was clearer and more natural.
                winner_provider_name: openai
                winner_model_name: gpt-4.1
                models:
                  - slot: A
                    model_name: gpt-4.1
                    provider_name: openai
                    provider_display_name: OpenAI
                    is_winner: true
                  - slot: B
                    model_name: gpt-4.1
                    provider_name: openai
                    provider_display_name: OpenAI
                    is_winner: false
                turns:
                  - turn_number: 1
                    prompt: Explain what friendship means.
                    responses:
                      - slot: A
                        response_text: >-
                          Friendship is a close and trusting relationship
                          between people who care about and support each other.
                          It is built on mutual respect, kindness, honesty, and
                          understanding. True friends enjoy each other’s
                          company, share both happy and difficult moments, and
                          accept each other’s strengths and weaknesses.
                          Friendship often involves helping, listening, and
                          encouraging each other, and grows stronger through
                          shared experiences and open communication. Ultimately,
                          friendship is about being there for one another and
                          valuing each other for who you truly are.
                        improvement_text: null
                      - slot: B
                        response_text: >-
                          Friendship is a special relationship between people
                          based on mutual affection, trust, support, and
                          understanding. It goes beyond simple acquaintanceship
                          or casual interactions; true friends care about each
                          other’s well-being and happiness.


                          At its core, friendship means:


                          - **Trust:** Friends can confide in each other and
                          rely on one another without fear of judgment.

                          - **Support:** Friends help each other through good
                          times and bad, offering encouragement, comfort, and
                          advice.

                          - **Enjoyment:** Friendship brings joy—friends have
                          fun together, share interests, laugh, and create
                          memories.

                          - **Understanding:** Friends accept each other's
                          strengths and weaknesses. They forgive mistakes and
                          understand feelings even when words aren’t spoken.

                          - **Mutual respect:** Friendship is built on
                          equality—each person values the other for who they
                          are.


                          Friendship enriches life by providing companionship,
                          reducing loneliness, helping us grow as individuals,
                          and making our experiences more meaningful.
                        improvement_text: null
                experiment:
                  model_mode: same_model
                  share_values_across_models: false
                  parameters:
                    temperature:
                      enabled: true
                      distribution: normal
                      slot_a_value: 1.231
                      slot_b_value: 0.8551
                    top_p:
                      enabled: true
                      distribution: uniform
                      slot_a_value: 0.9881
                      slot_b_value: 0.9413
                    top_k:
                      enabled: false
                      distribution: null
                      slot_a_value: null
                      slot_b_value: null
                    frequency_penalty:
                      enabled: true
                      distribution: uniform
                      slot_a_value: -0.4527
                      slot_b_value: 0.5555
                    presence_penalty:
                      enabled: true
                      distribution: uniform
                      slot_a_value: -0.0744
                      slot_b_value: 0.2874
          headers: {}
      security:
        - bearer: []

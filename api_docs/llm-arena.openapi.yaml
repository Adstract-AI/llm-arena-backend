        required: true
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  can_vote:
                    type: boolean
                  turns:
                    type: array
                    items:
                      type: object
                      properties:
                        turn_number:
                          type: integer
                        prompt:

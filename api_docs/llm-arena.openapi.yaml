openapi: 3.0.1
info:
  title: llm-arena
  description: ''
  version: 1.0.0
tags: []
paths:
  /api/arena/battles/:
    post:
      summary: start_battle
      deprecated: false
      description: ''
      tags: []
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
              required:
                - prompt
            example:
              prompt: Explain what friendship means in Macedonian.
        required: true
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  can_vote:
                    type: boolean
                  turns:
                    type: array
                    items:
                      type: object
                      properties:
                        turn_number:
                          type: integer
                        prompt:
                          type: string
                        responses:
                          type: array
                          items:
                            type: object
                            properties:
                              slot:
                                type: string
                              response_text:
                                type: string
                              improvement_text:
                                type: string
                                nullable: true
                            required:
                              - slot
                              - response_text
                required:
                  - id
                  - status
                  - can_vote
                  - turns
              examples:
                '1':
                  summary: Success
                  value:
                    id: 050fc153-48a5-4318-ac35-5c4c7549cb36
                    status: awaiting_vote
                    can_vote: true
                    turns:
                      - turn_number: 1
                        prompt: Explain what friendship means in Macedonian.
                        responses:
                          - slot: A
                            response_text: >-
                              Пријателството во македонскиот јазик може да се
                              опише како врска на меѓусебно разбирање, поддршка
                              и доверба меѓу две или повеќе личности. Тоа е
                              состојба во која пријателите се тука еден за друг
                              во добри и лоши времиња, нудејќи си емоционална,
                              физичка и ментална поддршка. Пријателството може
                              да се развие преку споделени искуства, заеднички
                              интереси и вредности, и често се гради на
                              комуникација, искреност и меѓусебна почит. Оваа
                              концепција на пријателство ја нагласува важноста
                              на човечките врски и значењето на луѓето кои ни го
                              прават животот побогат и позначаен.
                            improvement_text: null
                          - slot: B
                            response_text: >-
                              Пријателството во македонскиот јазик значи
                              „пријателство“ или „другарство“. Тоа е длабока и
                              значајна врска меѓу две или повеќе лица која се
                              гради на доверба, почит и заеднички искуства.
                              Пријателите често се поддржуваат едни со други во
                              добри и лоши моменти, нудат искрени совети и
                              уживаат во меѓусебното друштво.
                            improvement_text: null
          headers: {}
      security: []
  /api/arena/battles/BATTLE_ID/turns/:
    post:
      summary: continue_battle
      deprecated: false
      description: ''
      tags: []
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object

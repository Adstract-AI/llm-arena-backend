openapi: 3.0.1
info:
  title: chat
  description: ''
  version: 1.0.0
tags: []
paths:
  /api/chat/models/:
    get:
      summary: chat_models
      deprecated: false
      description: ''
      tags: []
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    external_model_id:
                      type: string
                    description:
                      type: string
                  required:
                    - name
                    - external_model_id
                    - description
              example:
                - name: vezilka-4b-it-fp16
                  external_model_id: finki_ukim/vezilka:4b-it-fp16
                  description: >-
                    Macedonian instruction-tuned FINKI model exposed through the
                    FINKI OpenAI-compatible endpoint.
                - name: vezilka-4b-it-fp32
                  external_model_id: finki_ukim/vezilka:4b-it-fp32
                  description: >-
                    Macedonian FINKI Vezilka model in fp32 format with 128K
                    context.
                - name: vezilka-4b-it-q4-k-m
                  external_model_id: finki_ukim/vezilka:4b-it-q4_K_M
                  description: >-
                    Macedonian FINKI Vezilka quantized q4_K_M model with 128K
                    context.
                - name: vezilka-4b-it-q8-0
                  external_model_id: finki_ukim/vezilka:4b-it-q8_0
                  description: >-
                    Macedonian FINKI Vezilka quantized q8_0 model with 128K
                    context.
          headers: {}
      security: []
  /api/chat/messages/:
    post:
      summary: send_follow_up_message
      deprecated: false
      description: ''
      tags: []
      parameters:
        - name: Content-Type
          in: header
          description: ''
          required: false
          example: application/json
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                provider_name:
                  type: string
                model_name:
                  type: string
                message:
                  type: string
                session_id:
                  type: string
              required:
                - provider_name
                - model_name
                - message
                - session_id
            example:
              provider_name: finki
              model_name: vezilka-4b-it-fp16
              message: Дали мислиш дека Македонија е убаво место?
              session_id: '{{SESSION_ID}}'
        required: true
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example:
                session_id: 0f8f5519-3e67-4cd5-8ae5-82cbd68ffaba
                response_text: >-
                  Македонија е позната по својата природна убавина, културно
                  наследство и традиции. Има многу интересни локации и заштитени
                  подрачја кои вреди да се посетат. Сепак, тоа е прашање на
                  личен вкус. Некои луѓе можат да ја најдат убава и вредна за
                  посета, додека други можат да имаат различни мислења.
                model_name: vezilka-4b-it-fp16
                provider_name: finki
          headers: {}
      security:
        - bearer: []
components:
  schemas: {}
  responses: {}
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
servers: []
security: []

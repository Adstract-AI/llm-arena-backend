openapi: 3.0.1
info:
  title: chat
  description: ''
  version: 1.0.0
tags: []
paths:
  /api/chat/models/:
    get:
      summary: chat_models
      deprecated: false
      description: ''
      tags: []
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    external_model_id:
                      type: string
                    description:
                      type: string
                  required:
                    - name
                    - external_model_id
                    - description
              example:
                - name: vezilka-4b-it-fp16
                  external_model_id: finki_ukim/vezilka:4b-it-fp16
                  description: >-
                    Macedonian instruction-tuned FINKI model exposed through the
                    FINKI OpenAI-compatible endpoint.
                - name: vezilka-4b-it-fp32
                  external_model_id: finki_ukim/vezilka:4b-it-fp32
                  description: >-
                    Macedonian FINKI Vezilka model in fp32 format with 128K
                    context.
                - name: vezilka-4b-it-q4-k-m
                  external_model_id: finki_ukim/vezilka:4b-it-q4_K_M
                  description: >-
                    Macedonian FINKI Vezilka quantized q4_K_M model with 128K
                    context.
                - name: vezilka-4b-it-q8-0
                  external_model_id: finki_ukim/vezilka:4b-it-q8_0
                  description: >-
                    Macedonian FINKI Vezilka quantized q8_0 model with 128K
                    context.
          headers: {}
      security: []
  /api/chat/messages/:
    post:
      summary: send_message
      deprecated: false
      description: ''
      tags: []
      parameters:
        - name: Content-Type
          in: header
          description: ''
          required: false
          example: application/json
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                provider_name:
                  type: string
                model_name:
                  type: string
                message:
                  type: string
              required:
                - provider_name
                - model_name
                - message
            example:
              provider_name: finki
              model_name: vezilka-4b-it-fp16
              message: Здраво, како си?
        required: true
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                  response_text:
                    type: string
                  model_name:
                    type: string
                  provider_name:
                    type: string
                required:
                  - session_id
                  - response_text
                  - model_name
                  - provider_name
              example:
                session_id: 35e81c46-16c5-40a8-83fb-53357a5ae2d2
                response_text: >-
                  Здраво! Јас сум прилично добро, ти благодарам што праша. Како
                  виртуелен асистент, постојано помагам и работам, па можам да
                  имам многу обврски. Но, кога имам слободен момент, уживам во
                  читање, пишување и поминување време со моите програмери и
                  други интелигентни луѓе.


                  Задоволство ми е што можам да ти помогнам со било кој проблем.
                  Среќен ден! 😊
                model_name: vezilka-4b-it-fp16
                provider_name: finki
          headers: {}
      security: []
components:
  schemas: {}
  responses: {}
  securitySchemes: {}
servers: []
security: []
